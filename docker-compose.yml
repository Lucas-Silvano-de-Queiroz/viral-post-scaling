services:
  app:
    build: .
    container_name: app
    ports:
      - "3000:3000"
    environment:
      CI: "true"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/appdb"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: